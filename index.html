<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glinthaven — Security IOC Search</title>
  <meta name="description" content="Fast, CLI-powered threat intelligence lookup. Search IPs, domains, hashes, URLs, emails, and CVEs across multiple threat intel sources." />
  <meta name="keywords" content="IOC, threat intelligence, security, VirusTotal, AbuseIPDB, Shodan, indicator of compromise" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/src/index.css" />
</head>
<body>
  <div id="app">
    <!-- Landing Hero -->
    <header id="landing-hero" class="landing-hero">
      <div class="hero-glow"></div>
      <div class="hero-content">
        <div class="logo-mark">
          <svg class="logo-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 4L6 14v20l18 10 18-10V14L24 4z" stroke="url(#logo-grad)" stroke-width="2" fill="none"/>
            <path d="M24 4v40M6 14l18 10 18-10M6 34l18-10 18 10" stroke="url(#logo-grad)" stroke-width="1.5" opacity="0.5"/>
            <circle cx="24" cy="24" r="6" fill="url(#logo-grad)" opacity="0.8"/>
            <circle cx="24" cy="24" r="3" fill="#0a0e17"/>
            <defs>
              <linearGradient id="logo-grad" x1="6" y1="4" x2="42" y2="44">
                <stop stop-color="#00f0ff"/>
                <stop offset="1" stop-color="#7b61ff"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 class="hero-title">glint<span class="accent">haven</span></h1>
        <p class="hero-subtitle">Where security research and OSINT find their flow.</p>
        <div class="hero-badges">
          <span class="badge">IPs</span>
          <span class="badge">Domains</span>
          <span class="badge">Hashes</span>
          <span class="badge">URLs</span>
          <span class="badge">CVEs</span>
          <span class="badge">Emails</span>
        </div>
        <button id="launch-terminal-btn" class="launch-btn">
          <span class="btn-icon">▸</span> Launch Terminal
        </button>
        <p class="hero-hint">or press <kbd>Enter</kbd> to start</p>
      </div>
    </header>

    <!-- Terminal View -->
    <main id="terminal-view" class="terminal-view hidden">
      <nav class="terminal-topbar">
        <div class="topbar-left">
          <span class="topbar-logo">glint<span class="accent">haven</span></span>
        </div>
        <div class="topbar-center">
          <span class="status-dot"></span>
          <span id="status-text" class="status-text">Ready</span>
        </div>
        <div class="topbar-right">
          <button id="settings-btn" class="topbar-btn" title="Settings (API Keys)">⚙</button>
          <button id="help-btn" class="topbar-btn" title="Help">?</button>
        </div>
      </nav>
      <div id="terminal-output" class="terminal-output"></div>
      <div class="terminal-input-row">
        <span class="prompt-symbol">❯</span>
        <input id="terminal-input" class="terminal-input" type="text" autocomplete="off" spellcheck="false" placeholder="Type an IOC or command… (try 'help')" autofocus />
      </div>
    </main>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal-overlay hidden">
      <div class="modal-card">
        <div class="modal-header">
          <h2>API Key Settings</h2>
          <button id="settings-close" class="modal-close">✕</button>
        </div>
        <div class="modal-body" id="settings-body">
          <!-- populated by settings.js -->
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
